<html lang="ko">
<head>

  <!-- PWA 아이콘 (덤벨 SVG를 base64로 인라인) -->

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'Noto Sans KR', sans-serif;
      background: #0f0f13;
      color: #f0eff4;
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    input, textarea, button { font-family: inherit; }
    .view { display: none; flex-direction: column; min-height: 100vh; padding: 20px; }
    .view.active { display: flex; }
    #view-calendar { padding: 0; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 0; }
    .header-title { font-size: 22px; font-weight: 700; letter-spacing: -1px; }
    .header-title span.yr { color: #a78bfa; }
    .header-btns { display: flex; gap: 8px; align-items: center; }
    .nav-btn {
      background: #1c1b25; border: none; color: #f0eff4;
      width: 36px; height: 36px; border-radius: 10px;
      cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center;
    }

    /* Monthly summary */
    .monthly-summary {
      margin: 12px 16px 0; background: #1c1b25; border-radius: 18px; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .monthly-left { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .monthly-label { font-size: 13px; color: #a78bfa; font-weight: 700; white-space: nowrap; }
    .monthly-count { font-size: 22px; font-weight: 700; color: #f0eff4; }
    .monthly-unit { font-size: 13px; color: #9ca3af; }
    .monthly-tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-end; }
    .type-tag {
      display: flex; align-items: center; gap: 4px;
      border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600;
    }
    .type-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* Calendar grid */
    .day-labels {
      display: grid; grid-template-columns: repeat(7,1fr);
      padding: 16px 10px 4px; gap: 2px;
    }
    .day-label { text-align: center; font-size: 11px; font-weight: 500; padding: 4px 0; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7,1fr);
      padding: 0 10px; gap: 4px;
    }
    .cal-cell {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 12px; cursor: pointer; position: relative;
      transition: background 0.15s;
    }
    .day-num {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .day-num.today { border: 2.5px solid #ef4444; color: #ef4444; font-weight: 700; }
    .cal-dots { display: flex; gap: 2px; margin-top: 2px; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; }

    /* Selected day panel */
    .selected-panel {
      margin: 14px 12px 0; background: #1c1b25; border-radius: 18px; overflow: hidden;
    }
    .selected-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
    }
    .selected-panel-title { font-size: 14px; font-weight: 700; }
    .selected-panel-actions { display: flex; gap: 8px; align-items: center; }
    .btn-add-log {
      font-size: 12px; padding: 4px 10px; border-radius: 10px;
      background: #a78bfa22; border: 1px solid #a78bfa55; color: #a78bfa; cursor: pointer;
    }
    .btn-close-panel { background: none; border: none; color: #6b7280; font-size: 18px; cursor: pointer; }
    .log-item { padding: 10px 16px; border-top: 1px solid #2d2c3a; }
    .log-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .log-item-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .log-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .log-type { font-size: 13px; font-weight: 700; }
    .log-place { font-size: 12px; color: #6b7280; }
    .log-item-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-edit-log { font-size: 11px; padding: 3px 9px; border-radius: 8px; background: #2d2c3a; border: none; color: #a78bfa; cursor: pointer; font-weight: 600; }
    .btn-del-log { font-size: 11px; padding: 3px 9px; border-radius: 8px; background: #2d2c3a; border: none; color: #ef4444; cursor: pointer; font-weight: 600; }
    .log-note { font-size: 13px; color: #d1d5db; line-height: 1.6; margin-left: 17px; white-space: pre-wrap; word-break: break-word; }

    /* Form */
    .section-label { font-size: 12px; color: #a78bfa; font-weight: 700; margin-bottom: 10px; letter-spacing: 0.5px; }
    .form-section { margin-bottom: 22px; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 8px 16px; border-radius: 20px; border: 2px solid #2d2c3a;
      background: #1c1b25; color: #d1d5db; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
    }
    .chip.selected-place { border-color: #a78bfa; background: #a78bfa22; color: #a78bfa; }
    .chip-dot { width: 7px; height: 7px; border-radius: 50%; opacity: 0.4; }
    .chip.selected-type .chip-dot { opacity: 1; }
    input[type="text"], textarea {
      width: 100%; padding: 14px 16px; border-radius: 14px;
      background: #1c1b25; border: 2px solid #2d2c3a; color: #f0eff4;
      font-size: 15px; outline: none; margin-top: 10px;
    }
    textarea { resize: vertical; line-height: 1.7; }
    .save-btn {
      margin-top: 20px; width: 100%; padding: 15px 0; border-radius: 16px;
      background: linear-gradient(135deg,#7c3aed,#a78bfa);
      border: none; color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 20px #7c3aed44;
    }
    .save-btn:disabled { background: #2d2c3a; color: #6b7280; box-shadow: none; cursor: not-allowed; }

    /* Settings */
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #1c1b25; border-radius: 12px; margin-bottom: 6px;
    }
    .settings-row-left { display: flex; align-items: center; gap: 10px; }
    .settings-dot { width: 14px; height: 14px; border-radius: 50%; }
    .btn-remove { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 16px; }
    .add-row { display: flex; gap: 8px; margin-top: 8px; }
    .add-row input { margin-top: 0; flex: 1; padding: 10px 14px; }
    .btn-add { padding: 10px 16px; border-radius: 12px; background: #a78bfa; border: none; color: #fff; font-weight: 700; cursor: pointer; font-size: 18px; }
    input[type="color"] { width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer; background: none; padding: 0; }
    .stats-card { background: #1c1b25; border-radius: 18px; padding: 20px; margin-bottom: 16px; }
    .bar-bg { height: 6px; background: #2d2c3a; border-radius: 6px; overflow: hidden; margin-top: 4px; }
    .bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s; }
    .stats-btn {
      width: 100%; padding: 16px 18px; border-radius: 16px; background: #1c1b25;
      border: 2px solid #2d2c3a; color: #f0eff4; font-size: 15px; font-weight: 600;
      cursor: pointer; text-align: left; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
    }

    /* Modal */
    .modal-bg {
      display: none; position: fixed; inset: 0; background: #000000bb;
      align-items: center; justify-content: center; z-index: 999; padding: 24px;
    }
    .modal-bg.show { display: flex; }
    .modal-box { background: #1c1b25; border-radius: 20px; padding: 28px; width: 100%; max-width: 320px; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; text-align: center; }
    .modal-sub { font-size: 13px; color: #9ca3af; margin-bottom: 24px; text-align: center; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-cancel { flex: 1; padding: 13px 0; border-radius: 14px; background: #2d2c3a; border: none; color: #f0eff4; font-size: 14px; font-weight: 600; cursor: pointer; }
    .modal-confirm { flex: 1; padding: 13px 0; border-radius: 14px; background: #ef4444; border: none; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }

    .back-btn { background: none; border: none; color: #a78bfa; font-size: 22px; cursor: pointer; margin-right: 12px; }
    .page-title { font-size: 18px; font-weight: 700; }
    .page-header { display: flex; align-items: center; margin-bottom: 24px; }
  </style>
</head>
<body>

<!-- CALENDAR VIEW -->
<div id="view-calendar" class="view active">
  <div class="header">
    <div class="header-title"><span class="yr" id="cal-year"></span> <span id="cal-month"></span>월</div>
    <div class="header-btns">
      <button class="nav-btn" onclick="prevMonth()">‹</button>
      <button class="nav-btn" onclick="nextMonth()">›</button>
      <button class="nav-btn" style="background:#23222d;font-size:18px" onclick="showView('settings')">⚙</button>
    </div>
  </div>

  <div class="monthly-summary">
    <div class="monthly-left">
      <span class="monthly-label">이달의 운동</span>
      <span class="monthly-count" id="monthly-count">0</span>
      <span class="monthly-unit">회</span>
    </div>
    <div class="monthly-tags" id="monthly-tags"></div>
  </div>

  <div class="day-labels">
    <div class="day-label" style="color:#f87171">일</div>
    <div class="day-label" style="color:#9ca3af">월</div>
    <div class="day-label" style="color:#9ca3af">화</div>
    <div class="day-label" style="color:#9ca3af">수</div>
    <div class="day-label" style="color:#9ca3af">목</div>
    <div class="day-label" style="color:#9ca3af">금</div>
    <div class="day-label" style="color:#60a5fa">토</div>
  </div>

  <div class="cal-grid" id="cal-grid"></div>

  <div id="selected-panel" style="display:none" class="selected-panel">
    <div class="selected-panel-header">
      <div class="selected-panel-title" id="selected-panel-title"></div>
      <div class="selected-panel-actions">
        <button class="btn-add-log" onclick="openFormForSelectedDay()">+ 추가</button>
        <button class="btn-close-panel" onclick="closePanel()">✕</button>
      </div>
    </div>
    <div id="selected-panel-logs"></div>
  </div>
</div>

<!-- FORM VIEW -->
<div id="view-form" class="view">
  <div class="page-header">
    <button class="back-btn" onclick="showView('calendar')">←</button>
    <div class="page-title" id="form-title"></div>
  </div>

  <div class="form-section">
    <div class="section-label">📍 장소</div>
    <div class="chip-row" id="place-chips"></div>
    <input type="text" id="custom-place-input" placeholder="장소를 직접 입력해주세요" style="display:none" oninput="updateSaveBtn()">
  </div>

  <div class="form-section">
    <div class="section-label">🏋️ 운동 종류</div>
    <div class="chip-row" id="type-chips"></div>
    <input type="text" id="custom-type-input" placeholder="운동 종류를 직접 입력해주세요" style="display:none" oninput="updateSaveBtn()">
  </div>

  <div class="form-section">
    <div class="section-label">📝 오늘의 기록</div>
    <textarea id="form-note" rows="4" placeholder="자유롭게 작성해주세요..."></textarea>
  </div>

  <button class="save-btn" id="save-btn" onclick="saveLog()" disabled>💾 저장하기</button>
</div>

<!-- SETTINGS VIEW -->
<div id="view-settings" class="view">
  <div class="page-header">
    <button class="back-btn" onclick="showView('calendar')">←</button>
    <div class="page-title">설정</div>
  </div>
  <button class="stats-btn" onclick="showView('stats')">
    <span>📊 총 운동량 보기</span><span style="color:#a78bfa">→</span>
  </button>

  <div style="margin-bottom:24px">
    <div class="section-label">📍 장소 관리</div>
    <div id="places-list"></div>
    <div class="add-row">
      <input type="text" id="new-place-input" placeholder="새 장소 추가">
      <button class="btn-add" onclick="addPlace()">+</button>
    </div>
  </div>

  <div>
    <div class="section-label">🏋️ 운동 종류 및 색상</div>
    <div id="types-list"></div>
    <div class="add-row">
      <input type="text" id="new-type-input" placeholder="새 운동 종류">
      <input type="color" id="new-type-color" value="#888888">
      <button class="btn-add" onclick="addType()">+</button>
    </div>
  </div>
</div>

<!-- STATS VIEW -->
<div id="view-stats" class="view">
  <div class="page-header">
    <button class="back-btn" onclick="showView('settings')">←</button>
    <div class="page-title">총 운동량</div>
  </div>
  <div class="stats-card">
    <div style="font-size:13px;color:#9ca3af;margin-bottom:4px">전체 운동 횟수</div>
    <div style="font-size:42px;font-weight:700;color:#a78bfa"><span id="total-count">0</span><span style="font-size:16px;color:#9ca3af;margin-left:4px">회</span></div>
  </div>
  <div class="stats-card">
    <div style="font-size:13px;color:#9ca3af;margin-bottom:14px">종류별 횟수</div>
    <div id="type-bars"></div>
  </div>
  <div style="font-size:13px;color:#a78bfa;font-weight:700;margin-bottom:12px;letter-spacing:0.5px">최근 기록</div>
  <div id="recent-logs"></div>
</div>

<!-- Delete confirm modal -->
<div class="modal-bg" id="delete-modal">
  <div class="modal-box">
    <div class="modal-title">기록을 삭제할까요?</div>
    <div class="modal-sub">삭제하면 복구할 수 없어요</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeDeleteModal()">취소</button>
      <button class="modal-confirm" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
const DEFAULT_TYPES = [
  { id: "hiit",     label: "HIIT",  color: "#3B82F6" },
  { id: "strength", label: "근력",  color: "#22C55E" },
  { id: "cardio",   label: "유산소", color: "#EF4444" },
  { id: "other",    label: "기타",  color: "#EAB308" },
];
const DEFAULT_PLACES = ["집앞", "두빛", "기타"];

function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let logs         = load("wj_logs",   []);
let workoutTypes = load("wj_types",  DEFAULT_TYPES);
let places       = load("wj_places", DEFAULT_PLACES);

const today = { year: new Date().getFullYear(), month: new Date().getMonth(), day: new Date().getDate() };
let currentYear  = today.year;
let currentMonth = today.month;
let selectedDay  = null;

// form state
let formDate      = null;
let formPlace     = "";
let formType      = "";
let editingLogId  = null;
let deleteTargetId = null;

// ── View switching ─────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (name === 'calendar') renderCalendar();
  if (name === 'settings') renderSettings();
  if (name === 'stats')    renderStats();
}

// ── Calendar ───────────────────────────────────────────
function renderCalendar() {
  document.getElementById('cal-year').textContent  = currentYear;
  document.getElementById('cal-month').textContent = currentMonth + 1;

  const logsThisMonth = logs.filter(l => l.year === currentYear && l.month === currentMonth);
  const totalCount = logsThisMonth.length;
  document.getElementById('monthly-count').textContent = totalCount;

  // monthly tags
  const tagsEl = document.getElementById('monthly-tags');
  tagsEl.innerHTML = '';
  workoutTypes.forEach(t => {
    const count = logsThisMonth.filter(l => l.typeId === t.id).length;
    if (!count) return;
    tagsEl.innerHTML += `<div class="type-tag" style="background:${t.color}22;color:${t.color}">
      <div class="type-dot" style="background:${t.color}"></div>${t.label} ${count}
    </div>`;
  });
  if (!totalCount) tagsEl.innerHTML = '<span style="font-size:12px;color:#6b7280">기록 없음</span>';

  // grid
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const firstDay    = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';

  for (let day = 1; day <= daysInMonth; day++) {
    const dayLogs = logs.filter(l => l.year === currentYear && l.month === currentMonth && l.day === day);
    const isToday = day === today.day && currentMonth === today.month && currentYear === today.year;
    const topColor = dayLogs[0]?.typeColor || 'transparent';
    const bg = dayLogs.length ? topColor + '22' : 'transparent';
    const dots = dayLogs.slice(0,3).map(l => `<div class="cal-dot" style="background:${l.typeColor}"></div>`).join('');
    grid.innerHTML += `
      <div class="cal-cell" style="background:${bg}" onclick="handleDayClick(${day})">
        <div class="day-num ${isToday ? 'today' : ''}">${day}</div>
        ${dayLogs.length ? `<div class="cal-dots">${dots}</div>` : ''}
      </div>`;
  }

  // selected panel
  if (selectedDay) renderSelectedPanel();
  else document.getElementById('selected-panel').style.display = 'none';
}

function handleDayClick(day) {
  const dayLogs = logs.filter(l => l.year === currentYear && l.month === currentMonth && l.day === day);
  if (dayLogs.length > 0) {
    selectedDay = (selectedDay === day) ? null : day;
    renderCalendar();
  } else {
    openForm(day);
  }
}

function closePanel() { selectedDay = null; renderCalendar(); }

function openFormForSelectedDay() { if (selectedDay) openForm(selectedDay); }

function renderSelectedPanel() {
  const panel = document.getElementById('selected-panel');
  const dayLogs = logs.filter(l => l.year === currentYear && l.month === currentMonth && l.day === selectedDay);
  if (!dayLogs.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  document.getElementById('selected-panel-title').textContent = `${currentMonth+1}월 ${selectedDay}일 기록`;
  const logsEl = document.getElementById('selected-panel-logs');
  logsEl.innerHTML = dayLogs.map(l => `
    <div class="log-item">
      <div class="log-item-header">
        <div class="log-item-left">
          <div class="log-dot" style="background:${l.typeColor}"></div>
          <span class="log-type" style="color:${l.typeColor}">${l.typeLabel}</span>
          <span class="log-place">· ${l.place}</span>
        </div>
        <div class="log-item-btns">
          <button class="btn-edit-log" onclick="openEditForm(${l.id})">수정</button>
          <button class="btn-del-log" onclick="askDelete(${l.id})">삭제</button>
        </div>
      </div>
      ${l.note ? `<div class="log-note">${escHtml(l.note)}</div>` : ''}
    </div>`).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function prevMonth() {
  if (currentMonth === 0) { currentYear--; currentMonth = 11; }
  else currentMonth--;
  selectedDay = null;
  renderCalendar();
}
function nextMonth() {
  if (currentMonth === 11) { currentYear++; currentMonth = 0; }
  else currentMonth++;
  selectedDay = null;
  renderCalendar();
}

// ── Form ───────────────────────────────────────────────
function openForm(day) {
  selectedDay = null;
  editingLogId = null;
  formDate = { year: currentYear, month: currentMonth, day };
  formPlace = ''; formType = '';
  document.getElementById('form-title').textContent = `${currentMonth+1}월 ${day}일 운동 기록`;
  document.getElementById('form-note').value = '';
  document.getElementById('custom-place-input').value = '';
  document.getElementById('custom-type-input').value = '';
  renderFormChips();
  showView('form');
}

function openEditForm(id) {
  const log = logs.find(l => l.id === id);
  if (!log) return;
  selectedDay = null;
  editingLogId = id;
  formDate = { year: log.year, month: log.month, day: log.day };
  document.getElementById('form-title').textContent = `${log.month+1}월 ${log.day}일 운동 수정`;
  document.getElementById('form-note').value = log.note || '';

  const knownPlace = places.includes(log.place);
  formPlace = knownPlace ? log.place : '기타';
  document.getElementById('custom-place-input').value = knownPlace ? '' : log.place;

  const knownType = workoutTypes.find(t => t.label === log.typeLabel);
  formType = knownType ? log.typeLabel : '기타';
  document.getElementById('custom-type-input').value = knownType ? '' : log.typeLabel;

  renderFormChips();
  showView('form');
}

function renderFormChips() {
  // places
  const placeEl = document.getElementById('place-chips');
  placeEl.innerHTML = places.map(p => `
    <button class="chip ${formPlace===p?'selected-place':''}" onclick="selectPlace('${p}')">${p}</button>
  `).join('');
  const cpi = document.getElementById('custom-place-input');
  cpi.style.display = formPlace === '기타' ? 'block' : 'none';

  // types
  const typeEl = document.getElementById('type-chips');
  typeEl.innerHTML = workoutTypes.map(t => `
    <button class="chip ${formType===t.label?'selected-type':''}" onclick="selectType('${t.label}')"
      style="${formType===t.label ? `border-color:${t.color};background:${t.color}22;color:${t.color}` : ''}">
      <div class="chip-dot" style="background:${t.color}"></div>${t.label}
    </button>
  `).join('');
  const cti = document.getElementById('custom-type-input');
  cti.style.display = formType === '기타' ? 'block' : 'none';

  updateSaveBtn();
}

function selectPlace(p) { formPlace = p; renderFormChips(); }
function selectType(t)   { formType  = t; renderFormChips(); }

function updateSaveBtn() {
  const cp = document.getElementById('custom-place-input').value.trim();
  const ct = document.getElementById('custom-type-input').value.trim();
  const ok = formPlace && formType &&
    (formPlace !== '기타' || cp) &&
    (formType  !== '기타' || ct);
  const btn = document.getElementById('save-btn');
  btn.disabled = !ok;
  btn.textContent = editingLogId ? '✏️ 수정 완료' : '💾 저장하기';
}

function saveLog() {
  const place = formPlace === '기타' ? document.getElementById('custom-place-input').value.trim() : formPlace;
  const typeLabel = formType === '기타' ? document.getElementById('custom-type-input').value.trim() : formType;
  const typeObj = workoutTypes.find(t => t.label === typeLabel) || { id: 'custom', label: typeLabel, color: '#EAB308' };
  const note = document.getElementById('form-note').value;

  if (editingLogId) {
    logs = logs.map(l => l.id === editingLogId
      ? { ...l, place, typeId: typeObj.id, typeLabel: typeObj.label, typeColor: typeObj.color, note }
      : l);
  } else {
    logs.push({ id: Date.now(), ...formDate, place, typeId: typeObj.id, typeLabel: typeObj.label, typeColor: typeObj.color, note });
  }
  save('wj_logs', logs);
  editingLogId = null;
  showView('calendar');
}

// ── Delete ─────────────────────────────────────────────
function askDelete(id) { deleteTargetId = id; document.getElementById('delete-modal').classList.add('show'); }
function closeDeleteModal() { deleteTargetId = null; document.getElementById('delete-modal').classList.remove('show'); }
function confirmDelete() {
  logs = logs.filter(l => l.id !== deleteTargetId);
  save('wj_logs', logs);
  closeDeleteModal();
  const dayLogs = logs.filter(l => l.year === currentYear && l.month === currentMonth && l.day === selectedDay);
  if (!dayLogs.length) selectedDay = null;
  renderCalendar();
}

// ── Settings ───────────────────────────────────────────
function renderSettings() {
  // places
  const pl = document.getElementById('places-list');
  pl.innerHTML = places.map(p => `
    <div class="settings-row">
      <span style="font-size:14px">${p}</span>
      ${p !== '기타' ? `<button class="btn-remove" onclick="removePlace('${p}')">✕</button>` : ''}
    </div>`).join('');

  // types
  const tl = document.getElementById('types-list');
  tl.innerHTML = workoutTypes.map(t => `
    <div class="settings-row">
      <div class="settings-row-left">
        <div class="settings-dot" style="background:${t.color}"></div>
        <span style="font-size:14px">${t.label}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="color" value="${t.color}" onchange="updateTypeColor('${t.id}', this.value)">
        ${!['hiit','strength','cardio','other'].includes(t.id)
          ? `<button class="btn-remove" onclick="removeType('${t.id}')">✕</button>` : ''}
      </div>
    </div>`).join('');
}

function addPlace() {
  const val = document.getElementById('new-place-input').value.trim();
  if (!val || places.includes(val)) return;
  places = [...places.filter(p => p !== '기타'), val, '기타'];
  save('wj_places', places);
  document.getElementById('new-place-input').value = '';
  renderSettings();
}
function removePlace(p) {
  places = places.filter(x => x !== p);
  save('wj_places', places);
  renderSettings();
}
function addType() {
  const name  = document.getElementById('new-type-input').value.trim();
  const color = document.getElementById('new-type-color').value;
  if (!name) return;
  const otherType = workoutTypes.find(t => t.label === '기타');
  workoutTypes = [...workoutTypes.filter(t => t.label !== '기타'), { id: 'c_' + Date.now(), label: name, color }];
  if (otherType) workoutTypes.push(otherType);
  save('wj_types', workoutTypes);
  document.getElementById('new-type-input').value = '';
  renderSettings();
}
function removeType(id) {
  workoutTypes = workoutTypes.filter(t => t.id !== id);
  save('wj_types', workoutTypes);
  renderSettings();
}
function updateTypeColor(id, color) {
  workoutTypes = workoutTypes.map(t => t.id === id ? { ...t, color } : t);
  logs = logs.map(l => l.typeId === id ? { ...l, typeColor: color } : l);
  save('wj_types', workoutTypes);
  save('wj_logs', logs);
  renderSettings();
}

// ── Stats ──────────────────────────────────────────────
function renderStats() {
  document.getElementById('total-count').textContent = logs.length;
  const bars = document.getElementById('type-bars');
  bars.innerHTML = workoutTypes.map(t => {
    const count = logs.filter(l => l.typeId === t.id).length;
    const pct   = logs.length ? Math.round(count / logs.length * 100) : 0;
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:7px">
          <div style="width:9px;height:9px;border-radius:50%;background:${t.color}"></div>
          <span style="font-size:13px">${t.label}</span>
        </div>
        <span style="font-size:13px;color:${t.color};font-weight:700">${count}회</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${t.color}"></div></div>
    </div>`;
  }).join('');

  const recent = document.getElementById('recent-logs');
  const sorted = [...logs].reverse().slice(0, 20);
  if (!sorted.length) { recent.innerHTML = '<div style="color:#6b7280;text-align:center;margin-top:20px">기록이 없어요</div>'; return; }
  recent.innerHTML = sorted.map(l => `
    <div style="background:#1c1b25;border-radius:14px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px">
      <div style="width:10px;height:10px;border-radius:50%;background:${l.typeColor};margin-top:4px;flex-shrink:0"></div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:13px;font-weight:600;color:${l.typeColor}">${l.typeLabel}</span>
          <span style="font-size:12px;color:#6b7280">${l.year}.${l.month+1}.${l.day}</span>
        </div>
        <div style="font-size:12px;color:#9ca3af;margin-top:2px">${l.place}</div>
        ${l.note ? `<div style="font-size:13px;color:#d1d5db;margin-top:4px;white-space:pre-wrap;word-break:break-word">${escHtml(l.note)}</div>` : ''}
      </div>
    </div>`).join('');
}

// ── Init ───────────────────────────────────────────────
renderCalendar();
</script>
</body>
</html>
